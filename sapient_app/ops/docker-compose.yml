# Single deployment surface for the three services. Each app has its own
# Dockerfile in its directory; this file only stitches them to the shared
# Postgres and to each other.
#
# Schemas:
#   public         finder + dashboard tables (drizzle + sqlalchemy share it)
#   visibility     visibility service tables (created by 001 migration)
#
# Env split:
#   ../.env                       repo-wide defaults (DATABASE_URL, etc.)
#   ../.env.finder                finder-only secrets (Reddit creds)
#   ../.env.visibility            visibility-only secrets (LLM keys, cost caps)
#   ../.env.dashboard             dashboard-only secrets (AUTH_*, Reddit OAuth)
#
# Variables in later files override earlier ones, so per-service files can
# narrow the shared DATABASE_URL if needed.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opportunities
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # -q so the healthcheck stays quiet when scraped; -d targets the app DB
      # rather than the postgres maintenance DB, catching catalog corruption.
      test: ["CMD-SHELL", "pg_isready -U postgres -d opportunities -q"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  finder:
    build:
      context: ..
      dockerfile: app/Dockerfile
    env_file:
      - ../.env
      - ../.env.finder
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/opportunities
      METRICS_PORT: "9090"
      OPS_LOGGING_PATH: /app/ops/logging/python
      SERVICE_NAME: finder
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"   # FastAPI
      - "9090:9090"   # Prometheus sidecar
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=2)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ../app:/app/app:ro
      - ../ops/logging/python:/app/ops/logging/python:ro

  visibility:
    build:
      context: ..
      dockerfile: visibility/Dockerfile
    env_file:
      - ../.env
      - ../.env.visibility
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/opportunities
      VISIBILITY_DB_SCHEMA: visibility
      METRICS_PORT: "9092"
      OPS_LOGGING_PATH: /app/ops/logging/python
      SERVICE_NAME: visibility
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8001/health\", timeout=2)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ../visibility:/app/visibility:ro
      - ../ops/logging/python:/app/ops/logging/python:ro

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    env_file:
      - ../.env
      - ../.env.dashboard
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/opportunities
      METRICS_PORT: "9091"
      SERVICE_NAME: dashboard
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
