name: Monthly ingest

# Runs on the 1st of each month at 02:00 UTC, plus manual trigger.
#
# IMPORTANT: live_scraper.py is bot-blocked from cloud / datacenter IPs by
# Foodpanda + GrabFood (see live_scraper.py docstring + scheduled/README.md).
# This workflow therefore defaults to --skip-scrape and runs only the
# downstream pipeline stages: CPI refresh, index_builder, Granger,
# dashboard_data. For full collection, run scheduled/monthly_ingest.py
# locally on a residential IP, or attach a self-hosted runner.
#
# Manual runs accept `run_scrape: true` via workflow_dispatch — useful if
# you've configured a self-hosted runner with residential IP.
#
# NOTE (2026-07-08): uifpi.db is gitignored and never present on GitHub-hosted
# runners, so scheduled runs will fail red at monthly_ingest.py's row-count
# guard. That is intentional: it beats committing zeroed exports (see the
# 2026-07-01 incident in CHANGELOG.md). To make cloud ingest work, attach a
# self-hosted runner that has the real uifpi.db.

on:
  schedule:
    - cron: '0 2 1 * *'   # 02:00 UTC on the 1st of every month
  workflow_dispatch:
    inputs:
      run_scrape:
        description: 'Run live_scraper.py (requires residential IP — leave false on GitHub-hosted runners)'
        required: false
        default: 'false'
      skip_cpi:
        description: 'Skip CPI refresh (use only if OECD/WB endpoints are down)'
        required: false
        default: 'false'

permissions:
  contents: write   # we push the ingest results back to main

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the commit pushes cleanly
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run orchestrator (dry-run sanity check)
        run: python scheduled/monthly_ingest.py --dry-run --skip-scrape

      - name: Run orchestrator (real)
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.run_scrape }}" != "true" ]; then
            ARGS="$ARGS --skip-scrape"
          fi
          if [ "${{ github.event.inputs.skip_cpi }}" = "true" ]; then
            ARGS="$ARGS --skip-cpi"
          fi
          echo "Invoking: scheduled/monthly_ingest.py $ARGS"
          python scheduled/monthly_ingest.py $ARGS

      - name: Diff summary
        run: |
          echo "--- git diff --stat ---"
          git diff --stat
          echo "--- files touched ---"
          git diff --name-only

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the artifacts the pipeline produces — never touch
          # scrapers or analysis source. Avoids accidentally committing
          # local-dev cruft if a developer's tree is dirty.
          git add \
            uifpi_index.csv \
            analysis_results/granger_results.json \
            analysis_results/summary.csv \
            dashboard_data/country_summary.json \
            dashboard_data/index_series.json \
            dashboard_data/latest_values.json \
            dashboard/public/data/country_summary.json \
            dashboard/public/data/index_series.json \
            dashboard/public/data/latest_values.json \
            docs/ingest_log.md \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          MONTH=$(date -u +%Y-%m)
          git commit -m "Monthly ingest ${MONTH}

          Auto-generated by .github/workflows/monthly_ingest.yml.
          See docs/ingest_log.md for per-country yields and any Granger
          crossover events this run."
          git push origin main
